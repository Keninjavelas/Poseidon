name: ci-cd

permissions:
  contents: read
  packages: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: poseidon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install edge dependencies
        working-directory: edge_ai
        run: pip install -r requirements.txt
      - name: Backend test
        working-directory: backend
        run: npm test -- --runInBand
      - name: Frontend test
        working-directory: frontend
        run: npm test -- --runInBand
      - name: Edge AI test
        working-directory: edge_ai
        run: pytest -q
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  publish-images:
    needs: test-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend-simulator
            file: backend/Dockerfile.simulator
            context: backend
          - image: backend-ingestion
            file: backend/Dockerfile.ingestion
            context: backend
          - image: backend-processing
            file: backend/Dockerfile.processing
            context: backend
          - image: backend-api
            file: backend/Dockerfile.api
            context: backend
          - image: frontend
            file: frontend/Dockerfile
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set image namespace
        run: echo "IMAGE_NAMESPACE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-check:
    needs: publish-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "::notice::KUBE_CONFIG_DATA is not configured; skipping deploy job."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: deploy-check
    if: github.ref == 'refs/heads/main' && needs.deploy-check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image namespace
        run: echo "IMAGE_NAMESPACE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Verify required images exist
        run: |
          set -euo pipefail
          images=(
            ${IMAGE_NAMESPACE}/backend-simulator:${IMAGE_TAG}
            ${IMAGE_NAMESPACE}/backend-ingestion:${IMAGE_TAG}
            ${IMAGE_NAMESPACE}/backend-processing:${IMAGE_TAG}
            ${IMAGE_NAMESPACE}/backend-api:${IMAGE_TAG}
            ${IMAGE_NAMESPACE}/frontend:${IMAGE_TAG}
          )

          missing=0
          for image in "${images[@]}"; do
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              echo "Found image: $image"
            else
              echo "::error::Missing image: $image"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required images are missing. Publish images before deployment."
            exit 1
          fi

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/poseidon.yaml

      - name: Pin deployments to immutable SHA images
        run: |
          kubectl -n poseidon set image deployment/poseidon-simulator simulator=${IMAGE_NAMESPACE}/backend-simulator:${IMAGE_TAG}
          kubectl -n poseidon set image deployment/poseidon-ingestion ingestion=${IMAGE_NAMESPACE}/backend-ingestion:${IMAGE_TAG}
          kubectl -n poseidon set image deployment/poseidon-processing processing=${IMAGE_NAMESPACE}/backend-processing:${IMAGE_TAG}
          kubectl -n poseidon set image deployment/poseidon-api api=${IMAGE_NAMESPACE}/backend-api:${IMAGE_TAG}
          kubectl -n poseidon set image deployment/poseidon-frontend frontend=${IMAGE_NAMESPACE}/frontend:${IMAGE_TAG}

      - name: Wait for rollout
        run: |
          kubectl -n poseidon rollout status deployment/timescaledb --timeout=180s
          kubectl -n poseidon rollout status deployment/redis --timeout=180s
          kubectl -n poseidon rollout status deployment/mosquitto --timeout=180s
          kubectl -n poseidon rollout status deployment/poseidon-simulator --timeout=180s
          kubectl -n poseidon rollout status deployment/poseidon-ingestion --timeout=180s
          kubectl -n poseidon rollout status deployment/poseidon-processing --timeout=180s
          kubectl -n poseidon rollout status deployment/poseidon-api --timeout=180s
          kubectl -n poseidon rollout status deployment/poseidon-frontend --timeout=180s

      - name: Verify cluster state
        run: |
          kubectl -n poseidon get pods -o wide
          kubectl -n poseidon get svc

      - name: Dump events on failure
        if: failure()
        run: kubectl -n poseidon get events --sort-by=.lastTimestamp | tail -n 100